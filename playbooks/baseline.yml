- name: Baseline configuration
  hosts: all
  become: true

  vars:
    run_id: "{{ lookup('pipe', 'date +%Y-%m-%d_%H-%M') }}"
    output_base_dir: "{{ playbook_dir }}/../output"

  roles:
    - { role: common, tags: ["baseline"] }

  post_tasks:
    - name: Log baseline execution
      copy:
        content: "Baseline applied on {{ inventory_hostname }} at {{ ansible_date_time.iso8601 }}"
        dest: "{{ output_base_dir }}/runs/{{ run_id }}/baseline_{{ inventory_hostname }}.log"
