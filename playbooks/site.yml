- name: Full infrastructure deployment
  hosts: all
  become: true

  roles:
    - { role: common, tags: ["baseline"] }
    - { role: users, tags: ["users"] }
    - { role: security, tags: ["security"] }
    - { role: monitoring, tags: ["monitoring"] }

  tasks:
    - name: Save execution log
      copy:
        content: "Execution completed on {{ inventory_hostname }} at {{ ansible_date_time.iso8601 }}"
        dest: "../output/run_{{ inventory_hostname }}.log"
